name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages.yml"
      - "docs/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set Node version
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --strict-peer-dependencies=false --frozen-lockfile

      - name: Build docs
        env:
          GITHUB_PAGES_BASE_PATH: /${{ github.event.repository.name }}
        run: pnpm --filter @starknetfoundation/starknet-start-docs... build

      - name: Prepare GitHub Pages artifact
        env:
          GITHUB_PAGES_BASE_PATH: /${{ github.event.repository.name }}
        run: pnpm --filter @starknetfoundation/starknet-start-docs prepare:github-pages

      - name: Disable Jekyll
        run: touch docs/dist/public/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

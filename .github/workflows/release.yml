name: Release

on:
  # Releases are triggered manually via the GitHub UI
  workflow_dispatch:

permissions: {}

jobs:
  release:
    permissions:
      id-token: write
      contents: write

    environment: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Set Node version
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --strict-peer-dependencies=false --frozen-lockfile
      - name: Run build
        run: pnpm build
      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GIT_TOKEN}@github.com/${GITHUB_REPOSITORY}"
        env:
          GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish packages
        run: pnpm beachball publish --access public --no-git-tags -y
      - name: Create GitHub releases
        run: node .github/scripts/create-github-releases.mjs
        env:
          GH_TOKEN: ${{ github.token }}

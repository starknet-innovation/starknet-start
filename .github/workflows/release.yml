name: Release

on:
  # Releases are triggered manually via the GitHub UI
  workflow_dispatch:

permissions: {}

jobs:
  release:
    permissions:
      id-token: write

    environment: Release
    runs-on: ubuntu-latest

    services:
      devnet:
        image: shardlabs/starknet-devnet-rs:0.7.0-seed0
        ports:
          - 5050:5050

    steps:
      - name: Create release app token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false
      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Set Node version
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --strict-peer-dependencies=false --frozen-lockfile
      - name: Run lint
        run: pnpm lint
      - name: Run format check
        run: pnpm format:check
      - name: Run build
        run: pnpm build
      - name: Run typecheck
        run: pnpm typecheck
      - name: Run test
        run: pnpm test:ci
      - name: Resolve release app user
        id: release-app-user
        run: |
          user_id="$(gh api "/users/${APP_SLUG}%5Bbot%5D" --jq .id)"
          echo "id=${user_id}" >> "$GITHUB_OUTPUT"
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Setup git
        run: |
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GIT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          APP_USER_ID: ${{ steps.release-app-user.outputs.id }}
          GIT_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Publish packages
        run: pnpm beachball publish --access public --no-git-tags -y
      - name: Refresh published commit
        run: |
          git fetch origin "${GITHUB_REF_NAME}" --depth=2
          git reset --hard "origin/${GITHUB_REF_NAME}"
      - name: Create GitHub releases
        run: node .github/scripts/create-github-releases.mjs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

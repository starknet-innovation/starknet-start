name: Build

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  test:
    services:
      devnet:
        image: shardlabs/starknet-devnet-rs:0.7.0-seed0
        ports:
          - 5050:5050
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Set Node version
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --strict-peer-dependencies=false --frozen-lockfile
      - name: Run check format
        run: pnpm format:check
      - name: Run lint
        run: pnpm lint
      - name: Run build
        run: pnpm build
      - name: Run typecheck
        run: pnpm typecheck
      - name: Run test
        run: pnpm test:ci
      - name: Check change files
        run: pnpm beachball check
